<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NotsCreator PRO</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161e;
            --primary: #bb86fc; /* Morado Neón */
            --secondary: #03dac6; /* Cian Neón */
            --text: #e1e1e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: var(--panel);
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }

        .header h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 4px; }

        .instrument-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .inst-btn {
            background: var(--panel);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .inst-btn.active {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 15px var(--primary);
        }

        .editor-container {
            background: var(--panel);
            margin: 20px;
            border-radius: 10px;
            padding: 40px 10px;
            overflow-x: auto;
            position: relative;
            border: 1px solid #333;
        }

        /* Contenedor de las líneas dinámicas */
        #staff-lines {
            position: relative;
            min-width: 1500px;
            height: 200px;
            display: flex;
            cursor: crosshair;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(187, 134, 252, 0.3);
            pointer-events: none;
        }

        .note-dot {
            position: absolute;
            width: 18px;
            height: 18px;
            background: var(--secondary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--secondary);
            z-index: 5;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 50px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-play { background: var(--secondary); color: var(--bg); }
        .btn-clear { background: #cf6679; color: white; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.5rem; }
            .inst-btn { padding: 8px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NotsCreator PRO</h1>
        <p>Mode: <span id="mode-indicator">PC/Android Ready</span></p>
    </div>

    <div class="instrument-selector">
        <button class="inst-btn active" onclick="setInstrument('guitar')">🎸 GUITARRA (6)</button>
        <button class="inst-btn" onclick="setInstrument('bass')">🎸 BAJO (4)</button>
        <button class="inst-btn" onclick="setInstrument('piano')">🎹 PIANO (5)</button>
        <button class="inst-btn" onclick="setInstrument('drums')">🥁 BATERÍA (4)</button>
    </div>

    <div class="editor-container">
        <div id="staff-lines">
            </div>
    </div>

    <div class="controls">
        <button class="btn btn-clear" onclick="clearAll()">BORRAR TODO</button>
        <button class="btn btn-play" onclick="play()">REPRODUCIR</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
